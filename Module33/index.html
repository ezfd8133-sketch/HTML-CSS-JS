<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form onsubmit="return validation()" method="post">
        <div class="name-container">
            <label id="name_label">Name:</label>
            <input type="text" id="name">
            <span id="name_error"> Skill Issue lock in your name do not got a number lil bro </span>
            
        </div>
        <br>
        <div class="age-container">
            <label id="age_label">Age:</label>
            <input type="text" id="age">
            <span id="age_error"> Skill Issue lock in your age aint got no letter </span>
            
        </div>
        <br>
        <div class="city-container">
            <label id="city_label">City:</label>
            <select id="city">
            <option value="" selected></option>
            <option value="Prishtine">Prishtine</option>
            <option value="Prizren">Prizren</option>
            <option value="Gjilan">Gjilan</option>
            <option value="Peja">Peja</option>
            </select>
            <span id="city_error"> Dont fail at city please you got this far</span>
        </div>
        <br>
        <button type="submit">Send</button>
    </form>

    <script src="main.js"></script>
</body>
</html>
